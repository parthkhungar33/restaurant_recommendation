services:
  - type: web
    name: restaurant-recommender-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.phase_2_retrieval.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_PATH
        value: src/phase_1_ingestion/data/restaurants.db
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: GROQ_API_KEY
        sync: false
